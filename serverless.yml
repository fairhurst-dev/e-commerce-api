service: e-commerce-api
frameworkVersion: "4"

package:
  individually: true

provider:
  name: aws
  runtime: nodejs20.x
  environment:
    USER_POOL_CLIENT_ID:
      Fn::GetAtt:
        - userPoolClient
        - ClientId

plugins:
  - serverless-esbuild

build:
  esbuild: false

functions:
  #users
  signUp:
    handler: src/user/web/sign_up.handler
    events:
      - httpApi:
          path: /auth/register
          method: POST

  confirmSignUp:
    handler: src/user/web/confirm.handler
    events:
      - httpApi:
          path: /auth/confirm
          method: POST

